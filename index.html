<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Open Graph (공유 미리보기 최적화) -->
    <meta property="og:title" content="도파민 가성비 계산기 💸">
    <meta property="og:description" content="내 소비의 가심비는 과연 몇 등급일까? 지금 바로 팩폭 진단받기!">
    <meta property="og:image" content="https://yw8837.github.io/dopamine-calculator/yeolmae_logo.png">
    <meta property="og:type" content="website">

    <title>도파민 가성비 계산기 | 열매스튜디오</title>
    
    <!-- Fonts: Pretendard -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    
    <!-- Kakao SDK -->
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js" integrity="sha384-lX9Wf9p1vG9jP9g8r8r8r8r8r8r8r8r8r8r8r8r8r8r8r8r8r8r8" crossorigin="anonymous"></script>

    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --primary-orange: #ff922b;
            --accent-pink: #ff4081;
            --text-main: #f0f6fc;
            --text-dim: #8b949e;
            --border-color: #30363d;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            --transition-speed: 0.5s;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Pretendard', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .screen {
            width: 100%; max-width: 480px;
            display: none; flex-direction: column;
            animation: slideIn var(--transition-speed) cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        .screen.active { display: flex; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-30px); } }

        header { text-align: center; margin-bottom: 30px; margin-top: 20px; }

        .logo {
            display: flex; align-items: center; justify-content: center;
            gap: 10px; font-size: 15px; font-weight: 800;
            color: var(--primary-orange); letter-spacing: 2px;
            margin-bottom: 8px; text-transform: uppercase; cursor: pointer;
        }

        .logo img {
            width: 32px; height: 32px; border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        h1 {
            font-size: 28px; font-weight: 800;
            background: linear-gradient(90deg, var(--primary-orange), var(--accent-pink));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }

        .card {
            background: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 20px; padding: 24px; box-shadow: var(--shadow); margin-bottom: 24px;
        }

        .input-group { margin-bottom: 28px; }
        label { display: block; font-size: 17px; color: var(--text-main); margin-bottom: 14px; font-weight: 700; }

        .category-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .category-btn {
            background: var(--bg-color); border: 1px solid var(--border-color);
            border-radius: 20px; padding: 14px 8px; color: var(--text-dim);
            font-size: 16px; font-weight: 800; cursor: pointer;
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); text-align: center;
        }
        .category-btn.active {
            background: rgba(255, 146, 43, 0.15); border-color: var(--primary-orange);
            color: var(--primary-orange); transform: scale(1.02);
            box-shadow: 0 4px 12px rgba(255, 146, 43, 0.2);
        }

        .input-wrapper { position: relative; display: flex; align-items: center; }
        input[type="text"] {
            width: 100%; background: var(--bg-color); border: 1px solid var(--border-color);
            border-radius: 12px; padding: 18px 16px; color: var(--text-main);
            font-size: 28px; font-weight: 800; outline: none;
        }
        .currency { position: absolute; right: 20px; color: var(--text-dim); font-size: 22px; font-weight: 800; }

        .emoji-selector { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .emoji-btn {
            background: var(--bg-color); border: 2px solid var(--border-color);
            border-radius: 16px; padding: 15px 0; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        .emoji-btn span { font-size: 34px; }
        .emoji-btn small { font-size: 13px; color: var(--text-dim); font-weight: 800; }
        .emoji-btn.active { border-color: var(--primary-orange); background: rgba(255, 146, 43, 0.1); }

        .btn-calculate {
            width: 100%; background: linear-gradient(135deg, var(--primary-orange), var(--accent-pink));
            border: none; border-radius: 14px; padding: 20px; color: white;
            font-size: 20px; font-weight: 800; cursor: pointer;
        }

        #resultPage { text-align: center; padding-top: 40px; }
        .final-grade { font-size: 140px; font-weight: 900; line-height: 1; margin-bottom: 10px; }
        .final-score { font-size: 20px; color: var(--text-dim); font-weight: 600; margin-bottom: 8px; }
        .receipt-summary {
            background: rgba(255, 255, 255, 0.05); border-radius: 8px;
            padding: 8px 16px; display: inline-block; color: var(--text-main);
            font-size: 15px; font-weight: 700; margin-bottom: 24px; border: 1px solid var(--border-color);
        }
        .gukbap-badge {
            background: #1c2128; border: 1px solid var(--border-color);
            color: var(--text-main); padding: 14px 28px; border-radius: 50px;
            display: inline-block; font-weight: 800; margin-bottom: 32px; font-size: 18px;
        }
        .ai-analysis { font-size: 20px; font-weight: 700; line-height: 1.5; margin-bottom: 48px; }

        .ad-banner-dummy {
            width: 100%; height: 100px; background: rgba(255, 255, 255, 0.03);
            border: 1px dashed var(--border-color); border-radius: 12px;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; color: var(--text-dim); font-size: 11px; margin: 16px 0;
        }

        .result-actions { display: flex; gap: 12px; margin-bottom: 24px; padding: 0 20px; }
        .btn-share { flex: 1; padding: 14px 0; border-radius: 12px; font-weight: 800; cursor: pointer; border: none; }
        .btn-share.kakao { background: #FEE500; color: #000000; }
        .btn-share.link { background: #21262d; color: var(--text-main); border: 1px solid var(--border-color); }

        .footer-disclaimer {
            width: 100%; max-width: 480px; padding: 24px 10px; margin-top: auto; 
            border-top: 1px dashed var(--border-color); display: flex; justify-content: center; gap: 20px;
        }
        .footer-link { font-size: 12px; color: var(--text-dim); font-weight: 600; cursor: pointer; }

        .custom-alert {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            z-index: 9999; display: none; justify-content: center; align-items: center;
        }
        .custom-alert-content {
            background: var(--card-bg); border: 1px solid var(--primary-orange);
            border-radius: 16px; padding: 24px; max-width: 320px; width: 100%; text-align: center;
        }
        .custom-alert-title { color: var(--primary-orange); font-weight: 800; margin-bottom: 12px; }
        .custom-alert-text { color: var(--text-main); font-size: 14px; margin-bottom: 24px; }
        .custom-alert-btn { background: var(--border-color); color: var(--text-main); border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="screen active" id="inputPage">
        <header>
            <div class="logo" onclick="goToInput()">
                <img src="yeolmae_logo.png" alt="Icon">
                Yeolmae Studio
            </div>
            <h1>도파민 가성비 계산기</h1>
        </header>

        <div class="card">
            <div class="input-group">
                <label>어디에 쓰셨나요?</label>
                <div class="category-selector">
                    <button class="category-btn active" onclick="selectCategory(this, 1.0)">🍚 맛있는 식비</button>
                    <button class="category-btn" onclick="selectCategory(this, 0.8)">🛍️ 충동적 쇼핑</button>
                    <button class="category-btn" onclick="selectCategory(this, 1.2)">🎮 문화/취미</button>
                    <button class="category-btn" onclick="selectCategory(this, 0.9)">💸 기타 (어디갔지?)</button>
                </div>
            </div>

            <div class="input-group">
                <label>얼마를 쓰셨나요?</label>
                <div class="input-wrapper">
                    <input type="text" id="amount" placeholder="0" maxlength="15">
                    <span class="currency">원</span>
                </div>
            </div>

            <div class="input-group">
                <label>그 지출로 얼마나 행복했나요?</label>
                <div class="emoji-selector">
                    <button class="emoji-btn" onclick="selectEmoji(this, 1)"><span>😭</span><small>후회막심</small></button>
                    <button class="emoji-btn active" onclick="selectEmoji(this, 5)"><span>😐</span><small>무난무난</small></button>
                    <button class="emoji-btn" onclick="selectEmoji(this, 8)"><span>🙂</span><small>꽤 만족</small></button>
                    <button class="emoji-btn" onclick="selectEmoji(this, 10)"><span>🤩</span><small>핵존좋</small></button>
                </div>
            </div>

            <button class="btn-calculate" onclick="goToResult()">도파민 측정(국밥지수)</button>
            <div class="ad-banner-dummy"><b>SPONSORED AD</b>Google AdSense / KaKao AdFit</div>
        </div>
    </div>

    <div class="screen" id="resultPage">
        <div class="result-title">최종 도파민 등급</div>
        <div class="final-grade" id="finalGrade">A</div>
        <div class="final-score">SCORE: <span id="finalScore">0</span></div>
        <div class="receipt-summary" id="receiptSummary">0원 / 분석 중</div>
        <div class="gukbap-badge" id="gukbapText">국밥 0그릇</div>
        <div class="ad-banner-dummy" style="margin-top: 0; margin-bottom: 24px;"><b>SPONSORED AD</b>Google AdSense / KaKao AdFit</div>
        <div class="ai-analysis" id="aiComment">분석 중...</div>
        <div class="result-actions">
            <button class="btn-share kakao" onclick="shareKakao()">💬 카카오 공유</button>
            <button class="btn-share link" onclick="copyLink()">🔗 링크 복사</button>
        </div>
        <div style="margin-top: auto; padding-bottom: 20px;"><button class="btn-home" onclick="goToInput()">현생으로 복귀</button></div>
    </div>

    <footer class="footer-disclaimer">
        <span class="footer-link" onclick="showTerms('service')">이용 약관</span>
        <span class="footer-link" onclick="showTerms('privacy')">개인정보처리 방침</span>
        <span class="footer-link" onclick="showTerms('disclaimer')">면책 조항</span>
    </footer>

    <div class="custom-alert" id="customAlert">
        <div class="custom-alert-content">
            <div class="custom-alert-title" id="alertTitle">알림</div>
            <div class="custom-alert-text" id="alertText">내용이 들어갑니다.</div>
            <button class="custom-alert-btn" onclick="closeAlert()">확인</button>
        </div>
    </div>

    <script>
        let selectedHappiness = 5; let selectedCategoryMultiplier = 1.0; let selectedCategoryText = "🍚 맛있는 식비";
        const amountInput = document.getElementById('amount');
        amountInput.addEventListener('input', (e) => {
            let value = e.target.value.replace(/[^0-9]/g, '');
            e.target.value = value ? Number(value).toLocaleString() : '';
        });
        function selectEmoji(el, value) { document.querySelectorAll('.emoji-btn').forEach(btn => btn.classList.remove('active')); el.classList.add('active'); selectedHappiness = value; }
        function selectCategory(el, multiplier) { document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active')); el.classList.add('active'); selectedCategoryMultiplier = multiplier; selectedCategoryText = el.innerText; }
        function showAlert(title, text) { document.getElementById('alertTitle').innerText = title; document.getElementById('alertText').innerHTML = text; document.getElementById('customAlert').style.display = 'flex'; }
        function closeAlert() { document.getElementById('customAlert').style.display = 'none'; }
        function showTerms(type) {
            if (type === 'service') showAlert('이용 약관', '본 유틸리티는 재미 목적의 도파민 시뮬레이터입니다.');
            else if (type === 'privacy') showAlert('개인정보처리 방침', '데이터는 서버에 저장되지 않습니다.');
            else if (type === 'disclaimer') showAlert('면책 조항', '결과에 대한 법적 책임을 지지 않습니다.');
        }
        function copyLink() { navigator.clipboard.writeText(window.location.href).then(() => showAlert('🔗 복사 완료', '링크가 복사되었습니다.')); }
        function goToResult(pushHistory = true) {
            const rawAmount = amountInput.value.replace(/,/g, ''); const amount = parseInt(rawAmount);
            if (!amount || amount <= 0) { showAlert('알림', "금액을 입력해주세요!"); return; }
            if (pushHistory) { const url = new URL(window.location); url.searchParams.set('a', amount); url.searchParams.set('h', selectedHappiness); url.searchParams.set('c', selectedCategoryMultiplier); window.history.pushState({ screen: 'result' }, '', url); }
            const score = Math.round(((selectedHappiness * selectedCategoryMultiplier) / amount) * 100000);
            const gukbapValue = (amount / 11000).toFixed(1);
            let grade = ""; let comment = ""; let color = "#ff922b";
            if (score >= 120) { grade = "S"; comment = "👑 완벽한 지출입니다!"; color = "#ffd700"; }
            else if (score >= 60) { grade = "A"; comment = "🟢 훌륭한 소비입니다!"; color = "#00e676"; }
            else if (score >= 20) { grade = "B"; comment = "🟠 무난한 소비입니다."; color = "#ff922b"; }
            else if (score >= 5) { grade = "C"; comment = "🟣 비싼 감이 있네요."; color = "#b388ff"; }
            else { grade = "F"; comment = "🔴 재앙입니다. 국밥 사드세요."; color = "#ff1744"; }
            document.getElementById('finalGrade').innerText = grade; document.getElementById('finalGrade').style.color = color;
            document.getElementById('finalScore').innerText = score; document.getElementById('receiptSummary').innerText = `${amount.toLocaleString()}원 / ${selectedCategoryText}`;
            document.getElementById('gukbapText').innerText = `🔥 국밥 ${gukbapValue}그릇 증발`;
            document.getElementById('aiComment').innerText = comment;
            document.getElementById('inputPage').classList.remove('active'); document.getElementById('resultPage').classList.add('active');
        }
        function goToInput(pushHistory = true) {
            if (pushHistory) { const url = new URL(window.location); url.search = ''; window.history.pushState({ screen: 'input' }, '', url); }
            document.getElementById('resultPage').classList.remove('active'); document.getElementById('inputPage').classList.add('active');
        }
        window.addEventListener('popstate', handleRoute);
        function handleRoute() {
            const params = new URLSearchParams(window.location.search);
            if (params.has('a')) goToResult(false); else goToInput(false);
        }
        window.addEventListener('DOMContentLoaded', handleRoute);
        function shareKakao() { showAlert('🚧 안내', '카카오 공유 기능은 점검 중입니다.'); }
    </script>
</body>
</html>

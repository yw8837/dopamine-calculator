    <title>매몰비용 탈출 계산기 | 열매스튜디오</title>
    
    <!-- Fonts: Pretendard -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />

    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --primary-cyan: #00d2ff;
            --accent-magenta: #f03e3e;
            --text-main: #f0f6fc;
            --text-dim: #8b949e;
            --border-color: #30363d;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            --transition-speed: 0.5s;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Screen Wrapper */
        .screen {
            width: 100%;
            max-width: 480px;
            display: none; 
            flex-direction: column;
            animation: slideIn var(--transition-speed) cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        .screen.active {
            display: flex;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeOut {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-30px); }
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            margin-top: 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 800;
            color: var(--primary-cyan);
            letter-spacing: 2px;
            margin-bottom: 8px;
            text-transform: uppercase;
            cursor: pointer;
        }

        .logo img {
            width: 24px;
            height: 24px;
            border-radius: 6px;
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(90deg, var(--primary-cyan), var(--accent-magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 24px;
            box-shadow: var(--shadow);
            margin-bottom: 24px;
        }

        .input-group {
            margin-bottom: 28px;
        }

        label {
            display: block;
            font-size: 17px; 
            color: var(--text-main); 
            margin-bottom: 14px;
            font-weight: 700;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        input[type="text"], input[type="number"] {
            width: 100%;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            color: var(--text-main);
            font-size: 20px; 
            font-weight: 800;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--primary-cyan);
        }

        .unit {
            position: absolute;
            right: 16px;
            color: var(--text-dim);
            font-size: 16px; 
            font-weight: 700;
        }

        /* Success Probability Slider */
        .slider-container {
            margin-top: 10px;
        }
        input[type="range"] {
            width: 100%;
            accent-color: var(--primary-cyan);
            height: 8px;
            background: var(--bg-color);
            border-radius: 4px;
            outline: none;
        }
        .slider-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 13px;
            color: var(--text-dim);
            font-weight: 600;
        }

        .btn-calculate {
            width: 100%;
            background: linear-gradient(135deg, var(--primary-cyan), var(--accent-magenta));
            border: none;
            border-radius: 14px;
            padding: 20px;
            color: white;
            font-size: 20px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
            margin-top: 10px;
        }

        .btn-calculate:active {
            transform: scale(0.98);
            filter: brightness(1.1);
        }

        /* Result Screen Styles */
        #resultPage {
            text-align: center;
            padding-top: 40px;
        }

        .result-title {
            font-size: 16px;
            color: var(--text-dim);
            text-transform: uppercase;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .escape-status {
            font-size: 60px;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 20px;
            text-transform: uppercase;
            animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        .score-box {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
        }

        .score-value {
            font-size: 48px;
            font-weight: 900;
            color: var(--primary-cyan);
        }

        .score-label {
            font-size: 14px;
            color: var(--text-dim);
            font-weight: 700;
        }

        .ai-analysis {
            font-size: 20px;
            font-weight: 700;
            line-height: 1.6;
            margin-bottom: 40px;
            color: var(--text-main);
            padding: 0 20px;
            word-break: keep-all; 
        }

        .result-actions {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            padding: 0 20px;
        }

        .btn-share {
            flex: 1;
            padding: 14px 0;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-share.kakao { background: #FEE500; color: #000000; }
        .btn-share.link { background: #21262d; color: var(--text-main); border: 1px solid var(--border-color); }
        
        .btn-home {
            background: var(--border-color);
            color: var(--text-main);
            border: none;
            border-radius: 12px;
            padding: 16px 32px;
            font-weight: 700;
            cursor: pointer;
            font-size: 16px;
        }

        /* Disclaimer Modal */
        .custom-alert {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .custom-alert-content {
            background: var(--card-bg);
            border: 1px solid var(--primary-cyan);
            border-radius: 16px;
            padding: 24px;
            max-width: 320px;
            width: 100%;
            text-align: center;
            animation: popIn 0.3s forwards;
            line-height: 1.5;
        }
        .custom-alert-title { color: var(--primary-cyan); font-weight: 800; margin-bottom: 12px; }
        .footer-disclaimer {
            width: 100%;
            max-width: 480px;
            padding: 24px 10px;
            margin-top: auto; 
            border-top: 1px dashed var(--border-color);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }
        .footer-link { font-size: 11px; color: var(--text-dim); font-weight: 600; cursor: pointer; }

    </style>
</head>

            <h1>매몰비용 탈출 계산기</h1>
        </header>

        <div class="card">
            <!-- Sunk Cost Input -->
            <div class="input-group">
                <label>이미 쏟아부은 비용 (돈/시간)</label>
                <div class="input-wrapper">
                    <input type="text" id="sunkCost" placeholder="0" maxlength="15">
                    <span class="unit">원</span>
                </div>
                <p style="font-size: 12px; color: var(--text-dim); margin-top: 5px;">* 아까워서 못 그만두는 바로 그 금액</p>
            </div>

            <!-- Future Cost Input -->
            <div class="input-group">
                <label>앞으로 더 투자해야 할 비용</label>
                <div class="input-wrapper">
                    <input type="text" id="futureCost" placeholder="0" maxlength="15">
                    <span class="unit">원</span>
                </div>
            </div>

            <!-- Probability Slider -->
            <div class="input-group">
                <label>이게 '대박'날 확률: <span id="probValue" style="color: var(--primary-cyan)">50</span>%</label>
                <div class="slider-container">
                    <input type="range" id="probability" min="0" max="100" value="50">
                    <div class="slider-labels">
                        <span>거의 절망</span>
                        <span>반반</span>
                        <span>근자감 뿜뿜</span>
                    </div>
                </div>
            </div>

            <button class="btn-calculate" onclick="calculateEscape()">탈출 견적 뽑기</button>
        </div>
    </div>

    <!-- [SCREEN 2: RESULT] -->
    <div class="screen" id="resultPage">
        <div class="result-title">나의 탈출 권고 등급</div>
        <div class="escape-status" id="escapeStatus">EMERGENCY</div>
        
        <div class="score-box">
            <div class="score-value" id="escapeScore">0</div>
            <div class="score-label">EXIT INDEX (탈출지수)</div>
        </div>

        <div class="ai-analysis" id="aiComment">분석 중...</div>
        
        <div class="result-actions">
            <button class="btn-share kakao" onclick="shareKakao()">💬 결과 공유</button>
            <button class="btn-share link" onclick="copyLink()">🔗 링크 복사</button>

        <div style="margin-top: auto; padding-bottom: 20px;">

    <!-- Custom Alert Modal -->
    <div class="custom-alert" id="customAlert">
        <div class="custom-alert-content">
            <div class="custom-alert-title" id="alertTitle">알림</div>
            <div class="custom-alert-text" id="alertText">내용</div>
            <button onclick="closeAlert()" style="margin-top:20px; padding:8px 20px; border-radius:8px; border:none; background:var(--border-color); color:white; cursor:pointer;">확인</button>
        </div>
    </div>

    <script>
        // Kakao SDK Init
        if (typeof Kakao !== 'undefined' && !Kakao.isInitialized()) {
            Kakao.init('57cdad81ce5f54c9c0220d9b346276ff');
        }

        const sunkInput = document.getElementById('sunkCost');
        const futureInput = document.getElementById('futureCost');
        const probSlider = document.getElementById('probability');
        const probDisplay = document.getElementById('probValue');

        // Input formatting
        [sunkInput, futureInput].forEach(input => {
            input.addEventListener('input', (e) => {
                let value = e.target.value.replace(/[^0-9]/g, '');
                e.target.value = value ? Number(value).toLocaleString() : '';
            });
        });

        probSlider.addEventListener('input', (e) => {
            probDisplay.innerText = e.target.value;
        });

        function showAlert(title, text) {
            document.getElementById('alertTitle').innerText = title;
            document.getElementById('alertText').innerText = text;
            document.getElementById('customAlert').style.display = 'flex';
        }
        function closeAlert() { document.getElementById('customAlert').style.display = 'none'; }

        function calculateEscape() {
            const sunk = parseInt(sunkInput.value.replace(/,/g, '')) || 0;
            const future = parseInt(futureInput.value.replace(/,/g, '')) || 0;
            const prob = parseInt(probSlider.value);

            if (sunk === 0 && future === 0) {
                showAlert('알림', '투자한 비용이나 투자할 비용을 입력해주세요!');
                return;
            }

            // [Escape Index Algorithm]
            // 기대가치(Expected Value) = 성공확률 * 10 (대략적 보상) - 추가비용의 상대적 무게
            // 지수가 높을수록 탈출해야 함.
            // 기본 점수: 미래의 손실 가능성 반영
            let score = 0;
            if (future > 0) {
                // 추가 비용이 발생할수록, 확률이 낮을수록 지수 상승
                score = Math.round(((future * (100 - prob)) / (sunk + future + 1)) * 1.5);
            } else {
                // 이미 끝난 거면 매몰비용에 대한 자책 지수
                score = Math.round((100 - prob) * 0.8);
            }
            
            // 보정: 점수가 너무 튀지 않게 0~100 사이로
            score = Math.min(Math.max(score, 0), 100);

            let status = "";
            let color = "";
            let commentPool = [];

            if (score >= 80) {
                status = "EMERGENCY";
                color = "#ff1744"; // Magenta Red
                commentPool = [
                    "🔴 당장 도망치세요! 당신은 지금 불타는 배 위에서 창문을 닦고 있습니다.",
                    "🔴 매몰비용에 눈이 멀어 미래까지 불태우고 계시군요. 손절도 실력입니다.",
                    "🔴 AI 분석 결과: '희망고문' 수치 치사량 초과. 당장 손을 떼지 않으면 대재앙입니다.",
                    "🔴 과거가 아까워서 미래를 버리시겠습니까? 비겁한 후퇴가 아니라 현명한 철수입니다."
                ];
            } else if (score >= 50) {
                status = "DANGER";
                color = "#ff9100"; // Orange
                commentPool = [
                    "🟠 위험 신호 감지! '혹시나' 하는 마음이 당신의 지갑을 갉아먹고 있습니다.",
                    "🟠 조금만 더 하면 될 것 같죠? 그게 바로 도박사들이 파산 직전에 하는 생각입니다.",
                    "🟠 밑 빠진 독에 물 붓기 1단계. 지금이라도 독을 교체하든 물을 끄든 하세요.",
                    "🟠 기회비용을 생각하세요. 그 돈과 시간으로 다른 걸 했다면 이미 성공했을 겁니다."
                ];
            } else if (score >= 20) {
                status = "CAUTION";
                color = "#ffd600"; // Yellow
                commentPool = [
                    "🟡 아슬아슬한 노란불. 아직 탈출할 기회는 있습니다. 냉정하게 한 번만 더 생각해보세요.",
                    "🟡 감정은 배제하고 데이터만 보세요. 본전 생각나기 시작하면 그때부턴 지옥입니다.",
                    "🟡 현상 유지 중입니다. 하지만 반등의 기미가 없다면 과감한 결단이 필요할 때입니다.",
                    "🟡 버티는 게 답일 때도 있지만, 지금은 탈출 계획서를 미리 써두어야 할 시점입니다."
                ];
            } else {
                status = "SAFE ZONE";
                color = "#00e676"; // Green
                commentPool = [
                    "🟢 합리적인 수준의 베팅입니다. 조금 더 밀고 나가봐도 괜찮을 확률이 높네요.",
                    "🟢 매몰비용보다는 미래 가치에 집중하고 계시군요. 계속 진행하셔도 좋습니다.",
                    "🟢 '아까워서' 하는 게 아니라 '가치가 있어서' 하는 지름길에 서 계십니다. 파이팅!",
                    "🟢 성공 확률이 비용을 이기고 있습니다. 승부수를 던질 타이밍일지도 모릅니다!"
                ];
            }

            document.getElementById('escapeStatus').innerText = status;
            document.getElementById('escapeStatus').style.color = color;
            document.getElementById('escapeScore').innerText = score;
            document.getElementById('aiComment').innerText = commentPool[Math.floor(Math.random() * commentPool.length)];

            // Screen Switch
            const inputPage = document.getElementById('inputPage');
            const resultPage = document.getElementById('resultPage');
            inputPage.style.animation = "fadeOut 0.4s forwards";
            setTimeout(() => {
                inputPage.classList.remove('active');
                resultPage.classList.add('active');
            }, 400);
        }

        function goToInput() {
            const inputPage = document.getElementById('inputPage');
            const resultPage = document.getElementById('resultPage');
            resultPage.style.animation = "fadeOut 0.4s forwards";
            setTimeout(() => {
                resultPage.classList.remove('active');
                inputPage.style.animation = "slideIn 0.5s forwards";
                inputPage.classList.add('active');
                inputPage.style.opacity = "1";
            }, 400);
        }

        function copyLink() {
            navigator.clipboard.writeText(window.location.href).then(() => {
                showAlert('복사 완료', '탈출 좌표가 복사되었습니다!');
            });
        }

        function shareKakao() {
            try {
                const status = document.getElementById('escapeStatus').innerText;
                const score = document.getElementById('escapeScore').innerText;
                Kakao.Share.sendDefault({
                    objectType: 'feed',
                    content: {
                        title: '📉 내 매몰비용 탈출 견적: ' + status,
                        description: '탈출 지수 ' + score + '점! 나는 과연 지금 도망쳐야 할까?',
                        imageUrl: 'https://images.unsplash.com/photo-1542382103-62589547ea8e?q=80&w=800&auto=format&fit=crop',
                        link: { mobileWebUrl: window.location.href, webUrl: window.location.href },
                    },
                    buttons: [{ title: '나도 측정하기', link: { mobileWebUrl: window.location.href, webUrl: window.location.href } }],
                });
            } catch(e) { showAlert('알림', '카카오 공유를 준비 중입니다.'); }
        }
    </script>
</body>
</html>
